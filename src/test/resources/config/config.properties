# ------------------------------------------
# Application Configuration
# ------------------------------------------
# Default application URL if no environment is specified (Used for local runs)
application.url=https://blazedemo.com/

# Environment-specific URLs ? override via -Denv=QA|STAGING|PRODUCTION
qa.url=https://blazedemo.com/
staging.url=https://blazedemo.com/
production.url=https://blazedemo.com/

# Browser
browser=chrome

# ------------------------------------------
# Test Execution Settings
# ------------------------------------------
test.timeout=15
test.retry.maxcount=1
# Run browsers in headless mode (true for CI, false for local debugging)
browser.headless=true

# ------------------------------------------
# Reporting Settings
# ------------------------------------------
tester.name=QA-Team

# ------------------------------------------
# Selenium Grid Settings (for Docker/Grid integration)
# ------------------------------------------
selenium.grid.enabled=true
# Set the host name here (Override for local Grid: -Dselenium.hubHost=localhost)
selenium.hubHost=selenium-hub
seleniumhub.urlFormat=http://%s:4444/wd/hub

#-------------------------------------------
# Test Data file paths
#-------------------------------------------
data.file.passengers.json=testdata/passengers.json
data.file.passengers.csv=testdata/passenger-data.csv

#-------------------------------------------
# AI Configuration (LangChain4j)
#-------------------------------------------
# Provider: "ollama" (local, free) or "openai" (cloud, paid)
ai.provider=ollama

# Ollama settings (local LLM — default for development)
ai.ollama.baseUrl=http://localhost:11434
ai.ollama.model=llama3.2

# OpenAI settings (cloud LLM — for production-quality output)
# API key is read from environment variable OPENAI_API_KEY (never hardcoded)
ai.openai.model=gpt-4o

# Data generation settings
ai.data.outputDir=testdata/
ai.data.defaultCount=10